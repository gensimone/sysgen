set -g renumber-window on
set -g base-index 1
set -s set-clipboard on
set -g history-limit 50000
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded..."
unbind n
bind n split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'
bind-key -T copy-mode-vi 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'

set -g status-style "bg=#f2f4f7,fg=#5c6370"
set -g message-style "bg=#e5e9f0,fg=#4c566a"
set -g message-command-style "bg=#e5e9f0,fg=#3b4252"
set -g pane-border-style "fg=#d8dee9"
set -g pane-active-border-style "fg=#81a1c1"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80
set -g window-status-style "bg=#f2f4f7,fg=#6b7280"
set -g window-status-current-style "bg=#e5e9f0,fg=#2e3440,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g status-left "#[fg=#4c566a,bg=#e5e9f0,bold] #S #[fg=#e5e9f0,bg=#f2f4f7]"
set -g status-right "#[fg=#6b7280] %Y-%m-%d #[fg=#81a1c1] %H:%M "
set -g display-panes-colour "#81a1c1"
set -g display-panes-active-colour "#bf616a"
set -g clock-mode-colour "#81a1c1"
set -g mode-style "bg=#d8dee9,fg=#2e3440"
set -g window-status-bell-style "bg=#bf616a,fg=#ffffff,bold"
